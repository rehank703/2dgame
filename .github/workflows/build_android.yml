name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf \
            libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          # Pinned Cython 0.29.33 is often the most stable for Kivy/Clang
          pip install --user --upgrade buildozer "cython<3.0" virtualenv
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          # Auto-accept licenses
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          
          # FORCE LOG LEVEL 2 (This reveals the hidden Clang/Multiplayer error)
          # We also fix the 'minapi' to 21 to ensure store compatibility
          sed -i 's/^log_level =.*/log_level = 2/' buildozer.spec
          
          buildozer -v android debug
        env:
          _JAVA_OPTIONS: "-Xmx4g"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Game-Debug-APK
          path: bin/*.apk
          
