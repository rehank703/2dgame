name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf \
            libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          # Pinned Cython 0.29.33 is the gold standard for NDK r25b
          pip install --user --upgrade buildozer "cython<3.0" virtualenv
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          # 1. Accept SDK Licenses
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          
          # 2. FORCE correct settings into spec (prevents manual errors)
          sed -i 's/^requirements =.*/requirements = python3, kivy==2.3.0, openssl, requests, urllib3, certifi/' buildozer.spec
          sed -i 's/^android.ndk =.*/android.ndk = 25b/' buildozer.spec
          sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec
          sed -i 's/^log_level =.*/log_level = 2/' buildozer.spec
          
          # 3. Clean and Build
          # We run 'appclean' once to clear any corrupted Clang cache from the previous failed runs
          buildozer android appclean
          buildozer -v android debug
        env:
          _JAVA_OPTIONS: "-Xmx4g"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Game-Multiplayer-Debug
          path: bin/*.apk
