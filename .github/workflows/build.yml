name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # 22.04 is the most stable for current Buildozer/P4A

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf \
            libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev libltdl-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          # Pin Cython to 0.29.33. Cython 3+ breaks the OpenSSL and pyjnius recipes!
          pip install --user --upgrade buildozer "cython==0.29.33" virtualenv
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Prepare buildozer.spec
        run: |
          # 1. Check if the spec file exists. If not, create it.
          if [ ! -f "buildozer.spec" ]; then
            buildozer init
          fi
          
          # 2. Modify requirements for your multiplayer game
          sed -i 's/^requirements =.*/requirements = python3, kivy==2.3.0, openssl, requests, urllib3, certifi/' buildozer.spec
          
          # 3. Force API and NDK versions
          sed -i 's/^android.ndk =.*/android.ndk = 25b/' buildozer.spec
          sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec
          
          # 4. Auto-accept SDK licenses
          sed -i 's/^# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^android.accept_sdk_license =.*/android.accept_sdk_license = True/' buildozer.spec
          
          # 5. TURN ON DETAILED LOGGING (Level 2)
          sed -i 's/^log_level =.*/log_level = 2/' buildozer.spec

      - name: Build APK
        run: |
          # Removed 'yes |' to prevent the broken pipe masking the real error
          buildozer android debug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Stable-Game-APK
          path: bin/*.apk
