name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build APK with Buildozer Action
        uses: ArtemSBulgakov/buildozer-action@v1.2.0
        with:
          # This specifically configures the environment for your Pygame code
          command: |
            [ ! -f buildozer.spec ] && buildozer init
            # 1. Set requirements for Pygame + Networking
            sed -i 's/^requirements =.*/requirements = python3, pygame, sdl2, sdl2_image, sdl2_ttf, sdl2_mixer/' buildozer.spec
            # 2. Set permissions for WiFi Multiplayer
            sed -i 's/^# android.permissions =.*/android.permissions = INTERNET, ACCESS_NETWORK_STATE, ACCESS_WIFI_STATE/' buildozer.spec
            # 3. Use stable NDK for Clang compatibility
            sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec
            sed -i 's/^android.ndk =.*/android.ndk = 25b/' buildozer.spec
            # 4. Final Build
            buildozer -v android debug
          repository_root: .
          workdir: .

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Crown-Battle-APK
          path: bin/*.apk
