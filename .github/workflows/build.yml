name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # Do not use 24.04; it is too strict for Buildozer

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf \
            libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer and Cython
        run: |
          # The 'break-system-packages' flag bypasses the PEP 668 error properly
          pip install --upgrade pip
          pip install --user --upgrade buildozer "cython<3.0" virtualenv --break-system-packages
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK with Auto-Fix
        run: |
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          
          # Fix common spec mistakes for Multiplayer/Store automatically
          sed -i 's/^requirements =.*/requirements = python3, kivy==2.3.0, openssl, requests, urllib3, certifi/' buildozer.spec
          sed -i 's/^android.ndk =.*/android.ndk = 25b/' buildozer.spec
          sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec
          
          # Force clean the build to avoid 'file not found' from previous attempts
          buildozer android clean
          buildozer -v android debug
        env:
          _JAVA_OPTIONS: "-Xmx4g"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Stable-Game-APK
          path: bin/*.apk
          
