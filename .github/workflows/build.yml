name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build APK with Buildozer Action
        uses: ArtemSBulgakov/buildozer-action@v1.2.0
        env:
          # THIS FIXES THE 'CHOWN' ERROR
          USER: root
        with:
          command: |
            # 1. Start fresh spec
            [ -f buildozer.spec ] && rm buildozer.spec
            buildozer init
            
            # 2. Inject your Pygame + Multiplayer requirements
            sed -i 's/^requirements =.*/requirements = python3, pygame, sdl2, sdl2_image, sdl2_ttf, sdl2_mixer, openssl, requests/' buildozer.spec
            
            # 3. Add WiFi/Internet permissions for your socket code
            sed -i 's/^# android.permissions =.*/android.permissions = INTERNET, ACCESS_NETWORK_STATE, ACCESS_WIFI_STATE/' buildozer.spec
            
            # 4. Set stable NDK/API to avoid Clang crashes
            sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec
            sed -i 's/^android.ndk =.*/android.ndk = 25b/' buildozer.spec
            
            # 5. Build!
            buildozer -v android debug
          repository_root: .
          workdir: .

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Crown-Battle-APK
          path: bin/*.apk
          
